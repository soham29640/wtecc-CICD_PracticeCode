apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: checkout

spec:
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string

  steps:
    - name: checkout
      image: bitnami/git:latest
      command: ["git"]
      args:
        - clone
        - --branch
        - "$(params.branch)"
        - "$(params.repo-url)"
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: echo

spec:
  params:
    - name: message
      type: string

  steps:
    - name: echo
      image: alpine:3
      command: ["/bin/echo"]
      args:
        - "$(params.message)"